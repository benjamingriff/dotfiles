prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: false
    width: 0.70
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit
  prs:
    - key: O
      builtin: checkout
    - key: D
      name: review diff
      command: >
        cd {{.RepoPath}} && gh-pr-review {{.RepoName}} {{.PrNumber}}
    - key: G
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit
repoPaths:
  BenGriffithsPEP/*: ~/pep-repos/*
  PEPhealth/*: ~/pep-repos/*
  benjamingriff/*: ~/repos/*
  PEPhealth/dataeng-dashboard-integration: ~/pep-repos/dataeng-dashboard-integration
theme:
  colors:
    text:
      primary: "#e0def4"
      secondary: "#3e9fb0"
      inverted: "#e0def4"
      faint: "#6e6a86"
      warning: "#eb6f92"
      success: "#9ccfd8"
    background:
      selected: "#26233a"
    border:
      primary: "#c4a7e7"
      secondary: "#3e9fb0"
      faint: "#26233a"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: diffnav
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
