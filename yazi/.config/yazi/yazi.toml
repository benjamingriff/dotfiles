# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
[mgr]
ratio          = [ 1, 4, 3 ]
sort-by        = "alphabetical"
sort-sensitive = false
sort-reverse 	 = false
sort-dir-first = true
sort-translit  = false
linemode       = "none"
show-hidden    = true
show-symlink   = true
scrolloff      = 5
mouse-events   = [ "click", "scroll" ]
title-format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab-size        = 2
max-width       = 600
max-height      = 900
cache-dir       = ""
image-delay     = 30
image-filter    = "triangle"
image-quality   = 75
ueberzug-scale  = 1
ueberzug-offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	{ run = '${EDITOR:-vi} "$@"', desc = "$EDITOR", block = true, for = "unix" },
	{ run = 'code %*',    orphan = true, desc = "code",           for = "windows" },
	{ run = 'code -w %*', block = true,  desc = "code (block)",   for = "windows" },
]
open = [
	{ run = 'xdg-open "$1"',                desc = "Open", for = "linux" },
	{ run = 'open "$@"',                    desc = "Open", for = "macos" },
	{ run = 'start "" "%1"', orphan = true, desc = "Open", for = "windows" },
	{ run = 'termux-open "$1"',             desc = "Open", for = "android" },
]
reveal = [
	{ run = 'xdg-open "$(dirname "$1")"',           desc = "Reveal", for = "linux" },
	{ run = 'open -R "$1"',                         desc = "Reveal", for = "macos" },
	{ run = 'explorer /select,"%1"', orphan = true, desc = "Reveal", for = "windows" },
	{ run = 'termux-open "$(dirname "$1")"',        desc = "Reveal", for = "android" },
	{ run = '''clear; exiftool "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show EXIF", for = "unix" },
]
extract = [
	{ run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
	{ run = 'ya pub extract --list %*',   desc = "Extract here", for = "windows" },
]
play = [
	{ run = 'xdg-open "$1"',                desc = "Play", for = "linux" },
	{ run = 'open "$@"',                    desc = "Play", for = "macos" },
	{ run = 'start "" "%1"', orphan = true, desc = "Play", for = "windows" },
	{ run = 'termux-open "$1"',             desc = "Play", for = "android" },
	{ run = '''mediainfo "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show media info", for = "unix" },
	{ run = 'mediainfo "%1" & pause', block = true, desc = "Show media info", for = "windows" },
]

[open]
rules = [
	# Folder
	{ url = "*/", use = [ "edit", "open", "reveal" ] },
	# Text
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "open", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	# JSON
	{ mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
	{ mime = "*/javascript", use = [ "edit", "reveal" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Fallback
	{ url = "*", use = [ "open", "reveal" ] },
]

[tasks]
micro-workers    = 10
macro-workers    = 10
bizarre-retry    = 3
image-alloc      = 536870912  # 512MB
image-bound      = [ 10000, 10000 ]
suppress-preload = false

[plugin]
fetchers = [
	# Mimetype
	{ group = "mime", url = "*/",         run = "mime.dir",    prio = "high" },
	{ group = "mime", url = "local://*",  run = "mime.local",  prio = "high" },
	{ group = "mime", url = "remote://*", run = "mime.remote", prio = "high" },
]
spotters = [
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# Fallback
	{ url = "*", run = "file" },
]
preloaders = [
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
previewers = [
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# JSON
	{ mime = "application/{json,ndjson}", run = "json" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	# Virtual Disk / Disk Image
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	# Empty file
	{ mime = "inode/empty", run = "empty" },
	# Fallback
	{ url = "*", run = "file" },
]

[input]
cursor-blink = false

# cd
cd-title  = "Change directory:"
cd-origin = "top-center"
cd-offset = [ 0, 2, 50, 3 ]

# create
create-title  = [ "Create:", "Create (dir):" ]
create-origin = "top-center"
create-offset = [ 0, 2, 50, 3 ]

# rename
rename-title  = "Rename:"
rename-origin = "hovered"
rename-offset = [ 0, 1, 50, 3 ]

# filter
filter-title  = "Filter:"
filter-origin = "top-center"
filter-offset = [ 0, 2, 50, 3 ]

# find
find-title  = [ "Find next:", "Find previous:" ]
find-origin = "top-center"
find-offset = [ 0, 2, 50, 3 ]

# search
search-title  = "Search via {n}:"
search-origin = "top-center"
search-offset = [ 0, 2, 50, 3 ]

# shell
shell-title  = [ "Shell:", "Shell (block):" ]
shell-origin = "top-center"
shell-offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash-title 	= "Trash {n} selected file{s}?"
trash-origin	= "center"
trash-offset	= [ 0, 0, 70, 20 ]

# delete
delete-title 	= "Permanently delete {n} selected file{s}?"
delete-origin	= "center"
delete-offset	= [ 0, 0, 70, 20 ]

# overwrite
overwrite-title  = "Overwrite file?"
overwrite-body   = "Will overwrite the following file:"
overwrite-origin = "center"
overwrite-offset = [ 0, 0, 50, 15 ]

# quit
quit-title  = "Quit?"
quit-body   = "The following tasks are still running, are you sure you want to quit?"
quit-origin = "center"
quit-offset = [ 0, 0, 50, 15 ]

[pick]
open-title  = "Open with:"
open-origin = "hovered"
open-offset = [ 0, 1, 50, 7 ]

[which]
sort-by      	 = "none"
sort-sensitive = false
sort-reverse 	 = false
sort-translit  = false
